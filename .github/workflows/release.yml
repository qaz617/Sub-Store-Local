name: Build Sub-Store Cross-Platform

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_and_release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: sub-store-org/Sub-Store
          path: Sub-Store

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11
          run_install: false

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: Sub-Store/backend/pnpm-lock.yaml

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          cd Sub-Store/backend
          echo "Current Directory: $(pwd)"
          echo "Contents of package.json:"
          cat package.json  
          pnpm install --frozen-lockfile

      - name: Generate Release Tag
        id: tag
        run: |
          cd Sub-Store/backend
          ver=$(node -p "require('./package.json').version")
          date=$(date +'%Y%m%d')
          echo "release_tag=${ver}-${date}" >> $GITHUB_OUTPUT

      - name: Apply Custom Patches
        run: |
          cd Sub-Store/backend

          echo '{"root": true, "ignorePatterns": ["**/*"]}' > .eslintrc.json

          node -e "
            const fs = require('fs');
            const path = 'src/restful/miscs.js';
            if (fs.existsSync(path)) {
              let content = fs.readFileSync(path, 'utf8');
              content = content.replace('https://sub-store.vercel.app/', 'http://0.0.0.0:3000');
              fs.writeFileSync(path, content);
              console.log('✅ Successfully patched miscs.js');
            } else {
              console.log('⚠️ Warning: miscs.js not found');
            }
          "

      - name: Build & Bundle
        run: |
          cd Sub-Store/backend
          pnpm run bundle:esbuild

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cross-Compile with Bun
        run: |
          cd Sub-Store/backend
          mkdir -p bin_output
          
          bun build dist/sub-store.bundle.js --compile --target=bun-linux-arm64 --outfile=bin_output/sub-store-linux-arm64
          bun build dist/sub-store.bundle.js --compile --target=bun-linux-x64 --outfile=bin_output/sub-store-linux-x64
          bun build dist/sub-store.bundle.js --compile --target=bun-darwin-arm64 --outfile=bin_output/sub-store-macos-arm64
          bun build dist/sub-store.bundle.js --compile --target=bun-darwin-x64 --outfile=bin_output/sub-store-macos-x64
          bun build dist/sub-store.bundle.js --compile --target=bun-windows-x64 --outfile=bin_output/sub-store-windows-x64.exe

      - name: Compress Release Files
        run: |
          cd Sub-Store/backend/bin_output
          mkdir -p ../release_files

          tar -czf ../release_files/sub-store-linux-arm64.tar.gz sub-store-linux-arm64
          tar -czf ../release_files/sub-store-linux-x64.tar.gz sub-store-linux-x64
          tar -czf ../release_files/sub-store-macos-arm64.tar.gz sub-store-macos-arm64
          tar -czf ../release_files/sub-store-macos-x64.tar.gz sub-store-macos-x64
          
          if [ -f "sub-store-windows-x64.exe" ]; then
            zip ../release_files/sub-store-windows-x64.zip sub-store-windows-x64.exe
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: Sub-Store ${{ steps.tag.outputs.release_tag }}
          files: Sub-Store/backend/release_files/*
          draft: false
          make_latest: true
